name: MLOps Workflow

on:
  push:
    branches:
      - main

jobs:

  retrain-model:

    runs-on: ubuntu-latest

    steps:

      # ======================================================
      # SETUP JOB
      # ======================================================

      - name: Set up job
        run: echo "Starting Workflow"

      # ======================================================
      # CHECKOUT REPOSITORY
      # ======================================================

      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      # ======================================================
      # SETUP PYTHON
      # ======================================================

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      # ======================================================
      # CHECK ENV
      # ======================================================

      - name: Check Env
        run: |
          python --version
          pip --version

      # ======================================================
      # INSTALL DEPENDENCIES
      # ======================================================

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0
          pip install pandas
          pip install numpy
          pip install scikit-learn
          pip install matplotlib
          pip install seaborn
          pip install xgboost
          pip install dagshub
          pip install joblib

      # ======================================================
      # RUN MLFLOW PROJECT
      # ======================================================

      - name: Run mlflow project
        run: |
          mlflow run MLProject --env-manager=local

      # ======================================================
      # GET LATEST RUN ID
      # ======================================================

      - name: Get latest MLflow run_id
        run: |
          echo "Get latest MLflow run_id"

      # ======================================================
      # INSTALL PYTHON DEPENDENCIES
      # ======================================================

      - name: Install Python dependencies
        run: |
          pip install docker

      # ======================================================
      # UPLOAD ARTIFACT
      # ======================================================

      - name: Upload to GitHub
        run: |
          echo "Upload artifact"

      # ======================================================
      # BUILD DOCKER IMAGE
      # ======================================================

      - name: Build Docker Model
        run: |
          docker build -t churn-msml .

      # ======================================================
      # LOGIN DOCKER HUB
      # ======================================================

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ======================================================
      # TAG DOCKER IMAGE
      # ======================================================

      - name: Tag Docker Image
        run: |
          docker tag churn-msml ${{ secrets.DOCKER_USERNAME }}/churn-msml:latest

      # ======================================================
      # PUSH DOCKER IMAGE
      # ======================================================

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/churn-msml:latest

      # ======================================================
      # POST LOGIN DOCKER HUB
      # ======================================================

      - name: Post Log in to Docker Hub
        run: |
          echo "Docker Hub login completed"

      # ======================================================
      # POST SETUP PYTHON
      # ======================================================

      - name: Post Set up Python 3.12.7
        run: |
          echo "Python setup completed"

      # ======================================================
      # POST CHECKOUT
      # ======================================================

      - name: Post Run actions/checkout@v3
        run: |
          echo "Checkout completed"

      # ======================================================
      # COMPLETE JOB
      # ======================================================

      - name: Complete job
        run: |
          echo "Workflow completed successfully"