name: MLOps Workflow

on:
  push:
    branches:
      - main

jobs:

  retrain-model:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: MLProject

    steps:

      # checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # setup python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # install dependency
      - name: Install Dependency
        run: |

          pip install --upgrade pip

          pip install -r requirements.txt

      # run modelling
      - name: Run Modelling
        run: |

          python modelling.py

      # build docker image
      - name: Build Docker Image
        run: |

          docker build -t churn-msml .

      # login docker hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # tag docker image
      - name: Tag Docker Image
        run: |

          docker tag churn-msml ${{ secrets.DOCKER_USERNAME }}/churn-msml:latest

      # push docker image
      - name: Push Docker Image
        run: |

          docker push ${{ secrets.DOCKER_USERNAME }}/churn-msml:latest