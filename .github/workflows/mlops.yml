name: MLOps Workflow

on:
  push:
    branches:
      - main

jobs:

  retrain-model:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: MLProject

    steps:

      # ======================================================
      # SETUP JOB
      # ======================================================

      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      # ======================================================
      # SETUP PYTHON
      # ======================================================

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      # ======================================================
      # CHECK ENV
      # ======================================================

      - name: Check Env
        run: |
          python --version
          pip --version
          mlflow --version

      # ======================================================
      # INSTALL DEPENDENCIES
      # ======================================================

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ======================================================
      # RUN MLFLOW PROJECT
      # ======================================================

      - name: Run mlflow project
        run: |
          python modelling.py

      # ======================================================
      # GET RUN ID
      # ======================================================

      - name: Get latest MLflow run_id
        run: |
          echo "Get latest MLflow run_id"

      # ======================================================
      # INSTALL PYTHON DEPENDENCIES
      # ======================================================

      - name: Install Python dependencies
        run: |
          pip install mlflow

      # ======================================================
      # UPLOAD
      # ======================================================

      - name: Upload to Google Drive
        run: |
          echo "Upload artifact placeholder"

      # ======================================================
      # BUILD DOCKER
      # ======================================================

      - name: Build Docker Model
        run: |
          docker build -t churn-msml .

      # ======================================================
      # LOGIN DOCKER
      # ======================================================

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ======================================================
      # TAG IMAGE
      # ======================================================

      - name: Tag Docker Image
        run: |
          docker tag churn-msml ${{ secrets.DOCKER_USERNAME }}/churn-msml:latest

      # ======================================================
      # PUSH IMAGE
      # ======================================================

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/churn-msml:latest